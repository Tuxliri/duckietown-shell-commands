services:

  duckiematrix-interface:
    image: ${REGISTRY}/duckietown/dt-duckiebot-interface:ente-${ARCH}
    container_name: duckiematrix-interface
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      DT_SUPERUSER: 1
      DT_LAUNCHER: duckiematrix-interface
    volumes:
      - /data:/data
      - /data/ramdisk/dtps:/dtps
      # avahi socket
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket

  ros1-duckiematrix-interface:
    image: ${REGISTRY}/duckietown/dt-ros-interface:ente-${ARCH}
    container_name: ros1-duckiematrix-interface
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      DT_LAUNCHER: duckiematrix-interface
      DT_SUPERUSER: 1
    volumes:
      # dtps sockets
      - /data/ramdisk/dtps:/dtps
      # avahi socket
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket